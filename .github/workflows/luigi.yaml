name: Luigi

on:
  pull_request:
    branches: [ "main" ]
    paths: [ "homelab/luigi/terraform/**" ]
  push:
    branches: [ "main" ]
    paths: [ "homelab/luigi/terraform/**" ]

jobs:
  plan:
    name: terraform plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: homelab/luigi/terraform
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: ${{ vars.PLAN_ROLE_ARN }}
      - name: Install Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15
      - name: Setup 1Password CLI
        uses: 1Password/install-cli-action@v4
      - name: Connect to Tailnet
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          audience: ${{ secrets.TS_AUDIENCE }}
          tags: tag:ci
          ping: ${{ vars.TAILNET_PING }}
      - name: Initialize Terraform
        env:
          TF_CLI_ARGS_init: -backend-config=bucket=${{ secrets.TERRAFORM_STATE_BUCKET }}
        run: terraform init
      - name: Check Terraform format
        run: terraform fmt -check
      - name: Run Terraform Plan
        id: plan
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          set -o pipefail
          op run --env-file .env.tpl -- \
            terraform \
            plan \
            -no-color \
            -input=false \
            -refresh=false \
            2>&1 | tee plan.txt
        continue-on-error: true
      - name: Comment Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
        with:
          script: |
            const fs = require('fs');
            const max = 65000;
            let plan = fs.readFileSync('homelab/luigi/terraform/plan.txt', 'utf8');
            if (plan.length > max) {
              plan = plan.slice(-max);
            }
            const body = [
              '### Terraform Plan — `homelab/luigi/terraform` (`' + process.env.PLAN_OUTCOME + '`)',
              '<details><summary>Show plan</summary>',
              '',
              '```terraform',
              plan,
              '```',
              '</details>',
            ].join('\n');
            const marker = '<!-- tf-plan:luigi -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            const payload = body + '\n' + marker;
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: payload,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: payload,
              });
            }
      - name: Fail if Plan Errored
        if: steps.plan.outcome == 'failure'
        run: exit 1

  apply:
    name: terraform apply
    needs: plan
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: homelab/luigi/terraform
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: ${{ vars.APPLY_ROLE_ARN }}
      - name: Install Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15
      - name: Setup 1Password CLI
        uses: 1Password/install-cli-action@v4
      - name: Connect to Tailnet
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          audience: ${{ secrets.TS_AUDIENCE }}
          tags: tag:ci
          ping: ${{ vars.TAILNET_PING }}
      - name: Initialize Terraform
        env:
          TF_CLI_ARGS_init: -backend-config=bucket=${{ secrets.TERRAFORM_STATE_BUCKET }}
        run: terraform init
      - name: Run Terraform Apply
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          op run --env-file .env.tpl -- \
            terraform apply \
            -auto-approve \
            -input=false
