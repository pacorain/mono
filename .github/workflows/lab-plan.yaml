name: Lab Plan

on:
  pull_request:
    branches: [ "main" ]
    paths: [ "terraform/lab/**"]

jobs:
  plan:
    name: terraform plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/lab
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: ${{ vars.PLAN_ROLE_ARN }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15
      - name: Setup 1Password CLI
        uses: 1Password/install-cli-action@v4
        with:
          version: 2.34

      - name: Run Terraform Plan
        run:
          op run --env-file .env.tpl -- terraform plan