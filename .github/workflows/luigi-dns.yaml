name: Luigi DNS

on:
  pull_request:
    branches: [ "main" ]
    paths: [ "homelab/luigi/dns/**", ".github/workflows/luigi-dns.yaml" ]
  push:
    branches: [ "main" ]
    paths: [ "homelab/luigi/dns/**", ".github/workflows/luigi-dns.yaml" ]
  schedule:
    # Weekly blocklist refresh
    - cron: "0 6 * * 0"
  workflow_dispatch:

jobs:
  build:
    name: build dns config
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: homelab/luigi/dns
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install dnsmasq
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends dnsmasq-base
      - name: Build config
        id: build
        run: |
          set -o pipefail
          scripts/build.sh dist 2>&1 | tee build.txt
        continue-on-error: true
      - name: Validate config
        id: validate
        if: steps.build.outcome == 'success'
        run: |
          set -o pipefail
          dnsmasq --test --conf-file=/dev/null --conf-dir="dist/dnsmasq.d,*.conf" 2>&1 | tee -a build.txt
        continue-on-error: true
      - name: Package artifact
        if: steps.validate.outcome == 'success'
        run: tar -czf dns-config.tar.gz -C dist dnsmasq.d
      - name: Comment Build on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          VALIDATE_OUTCOME: ${{ steps.validate.outcome }}
        with:
          script: |
            const fs = require('fs');
            const max = 65000;
            let output = fs.readFileSync('homelab/luigi/dns/build.txt', 'utf8');
            if (output.length > max) {
              output = output.slice(-max);
            }
            const body = [
              '### DNS Config Build — `homelab/luigi/dns` (build: `' + process.env.BUILD_OUTCOME + '`, validate: `' + process.env.VALIDATE_OUTCOME + '`)',
              '',
              '```',
              output,
              '```',
            ].join('\n');
            const marker = '<!-- dns-build:luigi -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            const payload = body + '\n' + marker;
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: payload,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: payload,
              });
            }
      - name: Fail if Build or Validation Errored
        if: steps.build.outcome == 'failure' || steps.validate.outcome == 'failure'
        run: exit 1
      - name: Upload Artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: dns-config
          path: homelab/luigi/dns/dns-config.tar.gz

  publish:
    name: publish + deploy
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: dns-config
      - name: Setup AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: ${{ vars.DNS_PUBLISH_ROLE_ARN }}
      - name: Publish to S3
        env:
          BUCKET: ${{ secrets.DNS_ARTIFACTS_BUCKET }}
        run: |
          BUILD_PATH="lab/luigi/dns/builds/$(date -u +%Y%m%dT%H%M%SZ)-${GITHUB_SHA::7}/dns-config.tar.gz"
          SHA256=$(sha256sum dns-config.tar.gz | cut -d' ' -f1)
          aws s3 cp dns-config.tar.gz "s3://${BUCKET}/${BUILD_PATH}"
          printf 'path=%s\nsha256=%s\ngit_sha=%s\nbuilt_at=%s\n' \
            "$BUILD_PATH" "$SHA256" "$GITHUB_SHA" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > latest
          aws s3 cp latest "s3://${BUCKET}/lab/luigi/dns/latest"
      - name: Connect to Tailnet
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          audience: ${{ secrets.TS_AUDIENCE }}
          tags: tag:ci
          ping: ${{ vars.TAILNET_PING }}
      - name: Setup 1Password CLI
        uses: 1Password/install-cli-action@v4
      # Best-effort immediate deploy; if it fails, luigi's hourly cron picks
      # up the new config from S3 anyway.
      - name: Trigger Sync Webhook
        continue-on-error: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          TOKEN=$(op read "op://Homelab/luigi-dns-webhook-token/password")
          curl -fsS -m 90 -X POST \
            -H "Authorization: Bearer $TOKEN" \
            http://10.11.0.67:9000/hooks/dns-sync
