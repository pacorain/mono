# Core dnsmasq behavior for luigi.
# Deployed to /etc/dnsmasq.d/ by the luigi-dns pipeline; do not edit on the node.

# Never forward plain names or reverse lookups for private ranges upstream
domain-needed
bogus-priv

# Ignore /etc/resolv.conf and /etc/hosts on the node; upstreams are explicit
no-resolv
no-hosts

# Upstream resolvers
server=1.1.1.1
server=1.0.0.1
server=9.9.9.9

# Only answer on loopback and the LAN address
listen-address=127.0.0.1,10.11.0.67
bind-interfaces

cache-size=10000
local-ttl=60
