# Homelab DNS records, under home.arpa (RFC 8375).
# Add records here; CI validates and ships them to luigi on merge.

# home.arpa is answered authoritatively by luigi and never forwarded upstream
local=/home.arpa/

host-record=luigi.home.arpa,10.11.0.67

# Examples:
# host-record=nas.home.arpa,10.11.0.20
# cname=media.home.arpa,nas.home.arpa
